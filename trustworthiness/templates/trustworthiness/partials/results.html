
<!-- Filters -->
<div class="d-flex align-items-center gap-5 mb-4">
    <div class="dropdown">
        <button class="btn btn-sm btn-phoenix-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="assessmentFilterBtn">
            All Assessments
        </button>
        <ul class="dropdown-menu" id="assessmentFilterMenu">
            <li><a class="dropdown-item active" href="#" data-value="">All assessments</a></li>
            <li><a class="dropdown-item" href="#" data-value="AI Act Questionnaire">AI Act Questionnaire</a></li>
            <li><a class="dropdown-item" href="#" data-value="Adversarial Robustness">Adversarial Robustness</a></li>
            <li><a class="dropdown-item" href="#" data-value="Code Analysis">Code Analysis</a></li>
        </ul>
    </div>
    <div class="search-box">
        <form class="position-relative" onsubmit="return false">
            <input id="assessmentRunsSearch" class="form-control-sm border border-gray-200 search-input search fs-9" type="search" placeholder="Search AI systems" aria-label="Search" />
            <span class="fas fa-search search-box-icon fs-9"></span>
        </form>
    </div>
</div>

<!-- Table -->
<div class="mx-n4 px-4 mx-lg-n6 px-lg-6 bg-body-emphasis border-top border-bottom border-translucent position-relative top-1">
    <div class="table-responsive mx-n1 px-1" style="overflow: visible;">
        <table class="table table-sm fs-9 mb-0" id="assessmentRunsTable" style="width: 100%;">
            <thead>
                <tr>
                    <th class="sort align-middle py-3 ps-2 fs-9 fw-bolder" scope="col" style="width:20%;">AI SYSTEM</th>
                    <th class="sort align-middle text-start fs-9" scope="col" style="width:18%;">ASSESSMENT</th>
                    <th class="sort align-middle text-start fs-9" scope="col" style="width:10%;">STATUS</th>
                    <th class="sort align-middle text-start fs-9" scope="col" style="width:7%;">SCORE</th>
                    <th class="sort align-middle text-start fs-9" scope="col" style="width:13%;">LAST ACCESSED</th>
                    <th class="sort align-middle text-start fs-9" scope="col" style="width:28%;">FINDINGS SUMMARY</th>
                    <th class="align-middle text-start fs-9" scope="col" style="width:4%;">ACTIONS</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
const MOCK_RUNS = [
    {
        ai_system: "Smart Grid Anomaly Detector",
        assessment_type: "AI Act Questionnaire",
        status: '<span class="badge badge-phoenix badge-phoenix-success fs-10-5">Completed</span>',
        score: "8.4",
        accessed_at: "Jun 02, 2026",
        findings_summary: "Minor transparency gaps in decision logging",
    },
    {
        ai_system: "LSTM (PyTorch)",
        assessment_type: "Adversarial Robustness",
        status: '<span class="badge badge-phoenix badge-phoenix-success fs-10-5">Completed</span>',
        score: "7.1",
        accessed_at: "Jun 01, 2026",
        findings_summary: "Sensitive to Gaussian noise on input sequences",
    },
    {
        ai_system: "Random Forest",
        assessment_type: "Code Analysis",
        status: '<span class="badge badge-phoenix badge-phoenix-danger fs-10-5">Failed</span>',
        score: "—",
        accessed_at: "May 29, 2026",
        findings_summary: "3 critical vulnerabilities in preprocessing pipeline",
    },
    {
        ai_system: "EV Fleet Load Balancer",
        assessment_type: "AI Act Questionnaire",
        status: '<span class="badge badge-phoenix badge-phoenix-success fs-10-5">Completed</span>',
        score: "9.2",
        accessed_at: "May 27, 2026",
        findings_summary: "Fully compliant — no high-risk flags raised",
    },
    {
        ai_system: "CNN-LSTM Hybrid",
        assessment_type: "Adversarial Robustness",
        status: '<span class="badge badge-phoenix badge-phoenix-success fs-10-5">Completed</span>',
        score: "6.8",
        accessed_at: "May 22, 2026",
        findings_summary: "Low robustness under PGD attack on vibration features",
    },
    {
        ai_system: "Gradient Boosting (sklearn)",
        assessment_type: "Code Analysis",
        status: '<span class="badge badge-phoenix badge-phoenix-success fs-10-5">Completed</span>',
        score: "8.9",
        accessed_at: "May 20, 2026",
        findings_summary: "2 medium-severity issues in feature encoding logic",
    },
    {
        ai_system: "Demand Response Controller",
        assessment_type: "AI Act Questionnaire",
        status: '<span class="badge badge-phoenix badge-phoenix-success fs-10-5">Completed</span>',
        score: "7.6",
        accessed_at: "May 15, 2026",
        findings_summary: "Explainability requirements partially unmet",
    },
    {
        ai_system: "XGBoost v1.7",
        assessment_type: "Code Analysis",
        status: '<span class="badge badge-phoenix badge-phoenix-success fs-10-5">Completed</span>',
        score: "9.5",
        accessed_at: "May 10, 2026",
        findings_summary: "No critical issues found",
    },
    {
        ai_system: "Transformer (BERT-based)",
        assessment_type: "Adversarial Robustness",
        status: '<span class="badge badge-phoenix badge-phoenix-danger fs-10-5">Failed</span>',
        score: "—",
        accessed_at: "May 07, 2026",
        findings_summary: "Evaluation timeout — model too large for sandbox",
    },
    {
        ai_system: "Energy Consumption Forecaster",
        assessment_type: "AI Act Questionnaire",
        status: '<span class="badge badge-phoenix badge-phoenix-success fs-10-5">Completed</span>',
        score: "8.0",
        accessed_at: "Apr 30, 2026",
        findings_summary: "Data governance documentation incomplete",
    },
];

const ACTIONS_HTML =
    '<div class="dropdown">' +
        '<button class="btn btn-sm dropdown-toggle dropdown-caret-none transition-none btn-reveal" type="button" data-bs-toggle="dropdown" data-boundary="window" aria-haspopup="true" aria-expanded="false">' +
            '<span class="fas fa-ellipsis-h fs-10"></span>' +
        '</button>' +
        '<div class="dropdown-menu dropdown-menu-end py-2">' +
            '<a class="dropdown-item" href="#">View results</a>' +
            '<a class="dropdown-item" href="#">Re-run</a>' +
            '<a class="dropdown-item text-danger" href="#">Delete</a>' +
        '</div>' +
    '</div>';

$(document).ready(function () {
    const table = $('#assessmentRunsTable').DataTable({
        data: MOCK_RUNS,
        autoWidth: false,
        columns: [
            { data: "ai_system", className: "ps-2 fw-semibold" },
            { data: "assessment_type" },
            { data: "status", render: data => data },
            { data: "score", className: "text-start" },
            { data: "accessed_at", className: "text-start" },
            { data: "findings_summary", className: "text-start" },
            { data: null, className: "text-start", orderable: false, defaultContent: ACTIONS_HTML },
        ],
        dom: 'rt<"row"<"col-sm-12 col-md-7 fs-9 mt-4"i><"col-sm-12 col-md-5 mt-4 d-flex justify-content-end"p>>',
        language: {
            info: "Showing _START_–_END_ of _TOTAL_",
            infoFiltered: "",
            emptyTable: "No assessment runs yet."
        },
        pageLength: 15,
        order: [[4, 'desc']],
        createdRow: row => $('td', row).addClass('align-middle py-3'),
    });

    // Global search (same pattern as projects-list)
    $('#assessmentRunsSearch').on('keyup change', function () {
        table.search(this.value).draw();
    });

    // Benchmark dropdown filter on column 1 (exact match)
    $('#assessmentFilterMenu .dropdown-item').on('click', function (e) {
        e.preventDefault();
        const value = $(this).data('value');

        $('#assessmentFilterMenu .dropdown-item').removeClass('active');
        $(this).addClass('active');
        $('#assessmentFilterBtn').text(value || 'All assessments');

        table.column(1).search(value ? '^' + value + '$' : '', true, false).draw();
    });

    $('#results-tab').on('shown.bs.tab', function () {
        table.columns.adjust().draw();
    });
});
</script>
