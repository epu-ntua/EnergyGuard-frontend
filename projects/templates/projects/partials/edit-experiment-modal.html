<div class="modal fade" id="editExperimentModal-{{ experiment.id }}" tabindex="-1" aria-labelledby="editExperimentModalLabel-{{ experiment.id }}" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form method="post" action="{% url 'edit_experiment' project_details.id experiment.id %}">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title" id="editExperimentModalLabel-{{ experiment.id }}">Edit Experiment</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Experiment Name</label>
            <input type="text" name="name" class="form-control" value="{{ experiment.name }}" maxlength="255" required>
          </div>
          <div class="mb-0">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3" placeholder="Enter experiment description">{{ experiment.description }}</textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
