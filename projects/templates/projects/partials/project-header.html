<!-- Header: Title + Actions dropdown + Evaluate button -->
<div class="d-flex justify-content-between align-items-start mb-8">
  <div class="d-flex align-items-center gap-2">
    <h2 class="text-body-emphasis fw-bolder mb-0">{{ project_details.name }}</h2>
    {% if is_creator %}
    <div class="btn-reveal-trigger">
      <button class="btn btn-sm dropdown-toggle dropdown-caret-none transition-none btn-reveal" type="button"
        data-bs-toggle="dropdown" data-boundary="window" aria-haspopup="true" aria-expanded="false"
        data-bs-reference="parent"><span class="fas fa-ellipsis-h"></span></button>
      <div class="dropdown-menu dropdown-menu-end py-2">
        <a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#editProjectModal">Edit project</a>
        <button class="dropdown-item text-danger" type="button"
          data-bs-toggle="modal"
          data-bs-target="#confirmActionModal"
          data-action-title="Delete Project"
          data-action-message="Are you sure you want to delete the project &lt;strong&gt;{{ project_details.name }}&lt;/strong&gt;? This action cannot be undone."
          data-confirm-text="Delete"
          data-confirm-class="btn-danger"
          data-action-url="{% url 'delete_project' project_details.id %}">Delete project</button>
      </div>
    </div>
    {% endif %}
  </div>
  <button class="btn btn-warning text-white fw-semibold" type="button">Evaluate Project</button>
</div>
