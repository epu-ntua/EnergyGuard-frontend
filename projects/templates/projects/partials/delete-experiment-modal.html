<div class="modal fade" id="deleteExperimentModal-{{ experiment.id }}" tabindex="-1" aria-labelledby="deleteExperimentModalLabel-{{ experiment.id }}" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="deleteExperimentModalLabel-{{ experiment.id }}">Delete Experiment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        Are you sure you want to delete the experiment <strong>{{ experiment.name }}</strong>? This action cannot be undone.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <form action="{% url 'delete_experiment' project_details.id experiment.id %}" method="post" class="m-0 p-0">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Delete</button>
        </form>
      </div>
    </div>
  </div>
</div>
