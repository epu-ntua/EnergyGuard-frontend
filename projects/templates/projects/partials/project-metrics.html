<!-- Performance Metrics -->
<div class="col-12">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="text-body-emphasis mb-0">Performance Metrics</h3>
    <select id="experimentSelect" class="form-select form-select-sm w-auto"></select>
  </div>
  <div class="row g-3 mb-8">
    <!-- Line chart card -->
    <div class="col-12 col-xl-6 shadow-none">
      <div class="card h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
              <h6 class="fs-8 fw-bold text-body-emphasis mb-0">Metrics Evolution</h6>
              <p class="fs-9 text-body-tertiary mb-0">Performance across all runs (chronological)</p>
            </div>
            <div id="lineLegend" class="d-flex flex-wrap gap-1 justify-content-end" style="max-width:58%"></div>
          </div>
          <div id="lineChart" style="height:420px;width:100%"></div>
        </div>
      </div>
    </div>
    <!-- Bar chart card -->
    <div class="col-12 col-xl-6 shadow-none">
      <div class="card h-100">
        <div class="card-body">
          <h6 class="fs-8 fw-bold text-body-emphasis mb-0">Best Run Metrics</h6>
          <p class="fs-9 text-body-tertiary mb-0">Optimal value per metric — ↑ higher is better, ↓ lower is better</p>
          <div id="barChart" style="height:360px;width:100%"></div>
          <div id="metricCards" class="row row-cols-3 row-cols-sm-6 g-2 mt-1"></div>
        </div>
      </div>
    </div>
  </div>
</div>
