<div class="modal fade" id="addExperimentModal" tabindex="-1" aria-labelledby="addExperimentModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form method="post" action="{% url 'create_experiment_modal' project_details.id %}">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title" id="addExperimentModalLabel">Add Experiment</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Experiment Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" placeholder="Enter experiment name" maxlength="255" required>
          </div>
          <div class="mb-0">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3" placeholder="Enter experiment description"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>
</div>
