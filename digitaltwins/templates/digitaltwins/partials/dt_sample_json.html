<div class="d-flex align-items-center justify-content-between mb-2">
    <div>
        <h5 class="fw-bold text-body-emphasis mb-0">{{ heading }}</h5>
        <p class="text-body-tertiary fs-8-5 mb-0">{{ subtitle }}</p>
    </div>
    <button type="button" class="btn btn-outline-secondary btn-sm d-inline-flex align-items-center gap-2 flex-shrink-0" id="copy-sample-json">
        <span class="fas fa-copy"></span>Copy Example
    </button>
</div>
<pre class="bg-dark text-light rounded-3 p-3 mb-0 fs-9" id="sample-json" style="overflow-x:auto;">{{ sample_json }}</pre>
