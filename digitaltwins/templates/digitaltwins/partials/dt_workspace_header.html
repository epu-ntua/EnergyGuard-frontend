{% load static %}
<div class="d-flex align-items-center gap-3 mb-4">
    <div class="rounded-3 border d-flex align-items-center justify-content-center flex-shrink-0 overflow-hidden"
        style="width:56px;height:56px;">
        <img src="{% static logo_path %}" alt="{{ logo_alt }}" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <div class="d-flex flex-column gap-1">
        <h2 class="fw-bolder text-body-emphasis mb-0">{{ title }}</h2>
        {% if subtitle %}
        <p class="mb-0">{{ subtitle }}</p>
        {% endif %}
    </div>
</div>
