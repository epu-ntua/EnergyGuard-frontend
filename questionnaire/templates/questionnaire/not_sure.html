{% extends "questionnaire/base_questionnaire.html" %}

{% block content %}
<div class="container mt-5" style="max-width: 700px;">
    <div class="card border-0 shadow-lg" style="border-radius: 24px;">
        <div class="card-body p-4 p-md-5 text-center">
            <div class="display-6 text-primary mb-3"><i class="bi bi-signpost-2-fill"></i></div>
            <h4 class="fw-bold mb-3">Before you continue</h4>

            <div class="alert alert-info border-0 shadow-sm text-start" style="background-color: #f0f9ff; color: #2c5282;">
                <i class="bi bi-info-circle-fill me-2"></i>{{ message }}
            </div>

            <div class="d-flex flex-wrap justify-content-center gap-3 mt-4">
                <a href="{% url 'questionnaire:step' track=track step_id=continue_step_id %}"
                   class="btn btn-lg px-5 py-2 shadow" style="border-radius: 16px; font-weight: 600; background-color: #4fd1ed; border: none; color: #fff;">
                    Continue to {{ continue_step_label }} <i class="bi bi-arrow-right ms-2"></i>
                </a>
                <a href="{% url 'questionnaire:start_track' track=track %}"
                   class="btn btn-outline-dark px-4 py-2" style="border-radius: 16px;">
                    <i class="bi bi-arrow-counterclockwise me-2"></i>Restart from {{ restart_step_label }}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
